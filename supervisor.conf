[program:notifyr-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/notifyr/current/artisan queue:work --sleep=3 --timeout=60 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/notifyr/current/storage/logs/worker.log
stopwaitsecs=3600
